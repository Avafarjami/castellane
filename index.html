<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Universal AR Ground</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
        body { margin: 0; overflow: hidden; }
        #overlay {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            z-index: 1000; background: rgba(0,0,0,0.8); color: white;
            padding: 15px 25px; border-radius: 30px; font-family: sans-serif;
            border: none; cursor: pointer; font-size: 16px;
        }
    </style>
</head>
<body style="margin: 0; overflow: hidden;">

    <button id="overlay" onclick="placeSquare()">کاشت مربع ۱ در ۱ متر</button>

    <a-scene 
        embedded 
        arjs="sourceType: webcam; debugUIEnabled: false; trackingMethod: best;"
        vr-mode-ui="enabled: false">
        
        <a-entity camera look-controls cursor="rayOrigin: mouse"></a-entity>

        <a-entity id="anchor"></a-entity>

    </a-scene>

    <script>
        function placeSquare() {
            // اجازه دسترسی به سنسورها در آیفون
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission().catch(console.error);
            }

            const anchor = document.getElementById('anchor');
            
            // اگر قبلاً ساخته شده، حذفش کن تا دوباره در نقطه جدید ساخته شود
            anchor.innerHTML = '';

            // ایجاد مربع ۱ در ۱ متر
            const square = document.createElement('a-plane');
            
            square.setAttribute('width', '1');
            square.setAttribute('height', '1');
            square.setAttribute('color', '#007bff');
            square.setAttribute('material', 'opacity: 0.6; transparent: true; side: double');
            
            // خواباندن روی زمین (۹۰ درجه چرخش)
            square.setAttribute('rotation', '-90 0 0');
            
            // قرار دادن در فاصله ۲ متری جلو و کمی پایین‌تر از سطح چشم (که روی زمین به نظر برسد)
            square.setAttribute('position', '0 -1.5 -2');

            anchor.appendChild(square);
            
            document.getElementById('overlay').innerText = "مربع قفل شد. دور گوشی بچرخید.";
        }
    </script>
</body>
</html>
