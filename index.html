<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>AR Test - Castellane</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>
    <script src="https://unpkg.com/aframe-look-at-component@0.8.0/dist/aframe-look-at-component.min.js"></script>
</head>

<body style="margin: 0; overflow: hidden;">
    <div style="position: absolute; top: 10px; width: 100%; text-align: center; z-index: 100; color: black; background: white; padding: 5px; font-size: 12px;">
        اگر متن را نمی‌بینید، ۳۶۰ درجه دور خود بچرخید
    </div>

    <a-scene 
        vr-mode-ui="enabled: false"
        embedded 
        arjs="sourceType: webcam; debugUIEnabled: false;">
        
        <a-camera gps-camera="minDistance: 1; maxDistance: 1000;" rotation-reader></a-camera>

        <a-box 
            gps-entity-place="latitude: 43.28585; longitude: 5.38405;" 
            scale="10 10 10" 
            material="color: white; opacity: 0.8">
            <a-text 
                value="I was here" 
                align="center" 
                color="black" 
                width="15"
                position="0 0 1"
                look-at="[gps-camera]">
            </a-text>
        </a-box>

        <a-entity id="auto-text-container"></a-entity>

    </a-scene>

    <script>
        // بلافاصله بعد از گرفتن موقعیت، یک متن در نزدیکی کاربر می‌سازد
        window.onload = () => {
            navigator.geolocation.getCurrentPosition((pos) => {
                const lat = pos.coords.latitude + 0.0001; // کمی متمایل به شمال (حدود ۱۰ متر)
                const lon = pos.coords.longitude;
                
                const container = document.getElementById('auto-text-container');
                const entity = document.createElement('a-entity');
                
                entity.setAttribute('gps-entity-place', `latitude: ${lat}; longitude: ${lon};`);
                entity.innerHTML = `
                    <a-box scale="5 5 5" material="color: white">
                        <a-text value="NEAR YOU" align="center" color="black" width="20" position="0 0 0.6" look-at="[gps-camera]"></a-text>
                    </a-box>
                `;
                container.appendChild(entity);
                console.log("پیام نزدیک شما کاشته شد در: ", lat, lon);
            });
        };

        // اجازه دسترسی برای آیفون
        window.onclick = () => {
            if (typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission();
            }
        };
    </script>
</body>
</html>
