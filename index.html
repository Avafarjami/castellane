<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>AR Memorial - Clean Look</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>
    <script src="https://unpkg.com/aframe-look-at-component@0.8.0/dist/aframe-look-at-component.min.js"></script>
</head>

<body style="margin: 0; overflow: hidden;">
    <a-scene 
        vr-mode-ui="enabled: false"
        embedded 
        arjs="sourceType: webcam; debugUIEnabled: false;">
        
        <a-camera gps-camera="minDistance: 5; maxDistance: 1000;" rotation-reader></a-camera>

        <a-text 
            value="I was here" 
            align="center" 
            color="black" 
            scale="40 40 40" 
            look-at="[gps-camera]"
            gps-entity-place="latitude: 43.28585; longitude: 5.38405;">
        </a-text>

        <a-entity id="auto-text-container"></a-entity>

    </a-scene>

    <script>
        window.onload = () => {
            navigator.geolocation.getCurrentPosition((pos) => {
                // ۳۰ متر فاصله برای اینکه متن مستقیماً توی صورت نباشد
                const lat = pos.coords.latitude + 0.0003; 
                const lon = pos.coords.longitude;
                
                const container = document.getElementById('auto-text-container');
                const entity = document.createElement('a-text');
                
                entity.setAttribute('value', "NEAR YOU");
                entity.setAttribute('align', 'center');
                entity.setAttribute('color', 'black');
                entity.setAttribute('scale', '30 30 30'); // سایز نصف شده نسبت به قبل
                entity.setAttribute('look-at', '[gps-camera]');
                entity.setAttribute('gps-entity-place', `latitude: ${lat}; longitude: ${lon};`);
                
                container.appendChild(entity);
            }, null, { enableHighAccuracy: true });
        };

        // اجازه سنسور برای آیفون
        window.onclick = () => {
            if (typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission();
            }
        };
    </script>
</body>
</html>
