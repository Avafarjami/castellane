<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>Hidden Memories XR Clean</title>
<style>
html,body{margin:0;padding:0;width:100%;height:100%;overflow:hidden;background:#07090f;color:#fff;font-family:Arial,sans-serif}#landing{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;background:#07090f;z-index:10}h1{margin:0;font-size:28px}button{padding:14px 28px;border:0;border-radius:10px;background:#00d4ff;color:#000;font-weight:700;font-size:16px}#status{position:fixed;left:50%;bottom:20px;transform:translateX(-50%);background:rgba(0,0,0,.65);padding:10px 16px;border-radius:999px;z-index:20}canvas{position:fixed;inset:0}
</style>
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
</head>
<body>
<div id="landing"><h1>Hidden Memories</h1><button id="enter">Enter AR</button></div>
<div id="status">Ready</div><div id="composer" style="position:fixed;left:50%;bottom:70px;transform:translateX(-50%);display:none;z-index:30;background:rgba(0,0,0,.65);padding:8px;border-radius:999px"><input id="msg" maxlength="30" placeholder="leave memory" style="border:0;outline:none;padding:8px 12px;border-radius:999px"><button id="send">Send</button></div>
<script>
const firebaseConfig={apiKey:"AIzaSyB_b5em8duOmdyNF006-BR1rSCIGNriCtk",authDomain:"hidden-memories-27f1a.firebaseapp.com",projectId:"hidden-memories-27f1a",storageBucket:"hidden-memories-27f1a.firebasestorage.app",messagingSenderId:"61920134607",appId:"1:61920134607:web:e62e0b4b3f947985b6beba"};
firebase.initializeApp(firebaseConfig);
const db=firebase.firestore();
const col=db.collection('messages');
let scene,camera,renderer,session,cube,reticle,viewerSpace,refSpace,hitTestSource,anchor;let placed=false;
const landing=document.getElementById('landing');
const statusEl=document.getElementById('status');
function init3D(){scene=new THREE.Scene();camera=new THREE.PerspectiveCamera(70,innerWidth/innerHeight,.01,20);renderer=new THREE.WebGLRenderer({antialias:true,alpha:true});renderer.setPixelRatio(window.devicePixelRatio||1);renderer.setSize(innerWidth,innerHeight);renderer.xr.enabled=true;document.body.appendChild(renderer.domElement);scene.add(new THREE.AmbientLight(0xffffff,2));cube=new THREE.Mesh(new THREE.BoxGeometry(.12,.12,.12),new THREE.MeshNormalMaterial());cube.position.set(0,0,-0.6);scene.add(cube);reticle=new THREE.Mesh(new THREE.RingGeometry(.08,.1,32),new THREE.MeshBasicMaterial({color:0x00d4ff}));reticle.rotation.x=-Math.PI/2;reticle.visible=false;scene.add(reticle);anchor=new THREE.Group();scene.add(anchor);window.addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight);});}
async function startAR(){try{if(typeof THREE==='undefined'){statusEl.textContent='Three.js failed';return;}if(!navigator.xr){statusEl.textContent='WebXR unsupported';return;}landing.style.display='none';statusEl.textContent='Starting AR...';init3D();session=await navigator.xr.requestSession('immersive-ar',{optionalFeatures:['local-floor','hit-test']});await renderer.xr.setSession(session);viewerSpace=await session.requestReferenceSpace('viewer');refSpace=await session.requestReferenceSpace('local');if(session.requestHitTestSource){hitTestSource=await session.requestHitTestSource({space:viewerSpace}).catch(()=>null);}session.addEventListener('end',()=>location.reload());document.addEventListener('click',placeZone);renderer.setAnimationLoop(loop);loadMessages();statusEl.textContent='Tap floor to place';}catch(err){statusEl.textContent='Error: '+err.message;landing.style.display='flex';}}
function loop(t,frame){if(cube&&!placed){cube.rotation.x+=0.01;cube.rotation.y+=0.015;}if(frame&&hitTestSource&&!placed){const hits=frame.getHitTestResults(hitTestSource);if(hits.length){const pose=hits[0].getPose(refSpace);if(pose){reticle.visible=true;reticle.position.set(pose.transform.position.x,pose.transform.position.y,pose.transform.position.z);}}}renderer.render(scene,camera);}function placeZone(e){if(!reticle.visible||placed)return;placed=true;anchor.position.copy(reticle.position);cube.visible=false;reticle.visible=false;document.getElementById('composer').style.display='block';statusEl.textContent='Memory anchored';}function loadMessages(){col.onSnapshot(s=>{anchor.clear();s.forEach(doc=>{const d=doc.data();const c=document.createElement('canvas');c.width=512;c.height=64;const x=c.getContext('2d');x.fillStyle='#fff';x.font='28px Arial';x.textAlign='center';x.fillText(d.text,256,40);const tex=new THREE.CanvasTexture(c);const m=new THREE.Mesh(new THREE.PlaneGeometry(.22,.04),new THREE.MeshBasicMaterial({map:tex,transparent:true}));m.rotation.x=-Math.PI/2;m.position.set(d.x||0,0.01,d.z||0);anchor.add(m);});});}document.getElementById('send').onclick=async()=>{if(!placed)return;const v=document.getElementById('msg').value.trim();if(!v)return;document.getElementById('msg').value='';await col.add({text:v,x:(Math.random()-.5)*0.6,z:(Math.random()-.5)*0.6,createdAt:firebase.firestore.FieldValue.serverTimestamp()});};
document.getElementById('enter').addEventListener('click',startAR);
</script>
</body>
</html>
