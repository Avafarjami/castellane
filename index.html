<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Hidden Memories - AR</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap');

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --accent: #00d4ff;
      --bg: #07090f;
      --text: #e8eaf0;
      --muted: #5a6070;
    }

    html, body {
      width: 100%; height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      overflow: hidden;
    }

    #landing {
      width: 100%; height: 100%;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 2rem; position: relative;
    }

    .grid-bg {
      position: absolute; inset: 0;
      background-image:
        linear-gradient(rgba(0,212,255,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,212,255,0.04) 1px, transparent 1px);
      background-size: 48px 48px;
      mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 30%, transparent 100%);
    }

    .square-preview {
      width: 100px; height: 100px;
      border: 1.5px solid var(--accent);
      position: relative; margin-bottom: 2rem;
      animation: pulse 3s ease-in-out infinite;
    }
    .square-preview::before, .square-preview::after {
      content: ''; position: absolute;
      width: 14px; height: 14px;
      border-color: white; border-style: solid;
    }
    .square-preview::before { top: -3px; left: -3px; border-width: 2px 0 0 2px; }
    .square-preview::after  { bottom: -3px; right: -3px; border-width: 0 2px 2px 0; }

    @keyframes pulse {
      0%,100% { box-shadow: 0 0 0 0 rgba(0,212,255,0.3); }
      50%      { box-shadow: 0 0 32px 4px rgba(0,212,255,0.12); }
    }

    h1 {
      font-family: 'DM Mono', monospace;
      font-size: clamp(1.1rem, 5vw, 1.4rem);
      font-weight: 500; margin-bottom: 0.4rem; text-align: center;
    }
    .subtitle {
      font-size: 0.8rem; color: var(--muted);
      font-family: 'DM Mono', monospace;
      margin-bottom: 2rem; text-align: center;
    }

    #launch-btn {
      padding: 14px 36px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem; font-weight: 500;
      color: var(--bg); background: var(--accent);
      border: none; border-radius: 4px; cursor: pointer;
    }

    #overlay {
      position: fixed; inset: 0;
      display: none; flex-direction: column;
      align-items: center; justify-content: flex-end;
      padding-bottom: 32px;
      pointer-events: none; z-index: 100;
    }
    #overlay.active { display: flex; }

    #status-box {
      font-family: 'DM Mono', monospace;
      font-size: 0.75rem; color: white;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.1);
      padding: 8px 18px; border-radius: 40px;
      text-align: center; max-width: 300px;
      margin-bottom: 12px;
    }

    #input-panel {
      pointer-events: all;
      display: none; gap: 8px; align-items: center;
      background: rgba(0,0,0,0.65);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 40px;
      padding: 8px 8px 8px 16px;
      width: 90%; max-width: 360px;
      margin-bottom: 12px;
    }
    #input-panel.visible { display: flex; }

    #msg-input {
      flex: 1; background: transparent;
      border: none; outline: none;
      color: white; font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
    }
    #msg-input::placeholder { color: rgba(255,255,255,0.3); }

    #send-btn {
      width: 36px; height: 36px; border-radius: 50%;
      background: var(--accent); border: none;
      cursor: pointer; font-size: 1rem; flex-shrink: 0;
      color: #000; font-weight: bold;
    }

    #exit-btn {
      pointer-events: all;
      padding: 8px 24px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.8rem; font-weight: 500;
      background: rgba(255,255,255,0.08);
      color: white;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 40px; cursor: pointer;
    }
  </style>
</head>
<body>

<div id="landing">
  <div class="grid-bg"></div>
  <div class="square-preview"></div>
  <h1>hidden memories</h1>
  <p class="subtitle">leave a word on the floor</p>
  <button id="launch-btn">enter AR</button>
</div>

<div id="overlay">
  <div id="status-box">initializing camera...</div>
  <div id="input-panel">
    <input id="msg-input" type="text" maxlength="30" placeholder="write something…">
    <button id="send-btn">↑</button>
  </div>
  <button id="exit-btn">exit</button>
</div>

<div id="canvas-container"></div>
