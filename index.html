<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Geo-AR: Live Text Creator</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>
    <script src="https://unpkg.com/aframe-look-at-component@0.8.0/dist/aframe-look-at-component.min.js"></script>
    <style>
        .controls {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            z-index: 100; width: 90%; text-align: center;
        }
        button {
            padding: 20px; font-size: 18px; background: #007bff; color: white;
            border: none; border-radius: 50px; box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        #status-bar {
            position: absolute; top: 10px; width: 100%; text-align: center;
            color: white; z-index: 100; font-family: sans-serif; font-size: 12px;
        }
    </style>
</head>

<body style="margin: 0; overflow: hidden;">
    <div id="status-bar">در حال دریافت سیگنال GPS...</div>
    
    <div class="controls">
        <button id="add-btn">📝 ثبت پیام در موقعیت فعلی من</button>
    </div>

    <a-scene 
        vr-mode-ui="enabled: false"
        embedded 
        arjs="sourceType: webcam; debugUIEnabled: false;">
        
        <a-camera gps-camera rotation-reader></a-camera>

        <a-text
            value="Castellane Station"
            scale="80 80 80"
            look-at="[gps-camera]"
            gps-entity-place="latitude: 43.2858; longitude: 5.3840;"
            color="yellow">
        </a-text>

    </a-scene>

    <script>
        const status = document.getElementById('status-bar');
        const addBtn = document.getElementById('add-btn');

        // ۱. فعال‌سازی سنسورهای حرکتی برای آیفون
        window.addEventListener('click', function() {
            if (typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission().catch(console.error);
            }
        }, {once: true});

        // ۲. تابع اصلی برای اضافه کردن متن در لحظه
        addBtn.addEventListener('click', () => {
            status.innerText = "در حال دریافت مختصات دقیق...";
            
            navigator.geolocation.getCurrentPosition((position) => {
                const lat = position.coords.latitude;
                const lon = position.coords.longitude;
                
                const message = prompt("چه پیامی می‌خواهید در این نقطه بگذارید؟");
                
                if (message) {
                    const scene = document.querySelector('a-scene');
                    const newText = document.createElement('a-text');
                    
                    // تنظیمات متن جدید
                    newText.setAttribute('value', message);
                    newText.setAttribute('color', '#00FF00'); // سبز برای پیام‌های جدید
                    newText.setAttribute('scale', '100 100 100');
                    newText.setAttribute('align', 'center');
                    newText.setAttribute('look-at', '[gps-camera]');
                    
                    // قرار دادن در مختصات فعلی شما
                    newText.setAttribute('gps-entity-place', `latitude: ${lat}; longitude: ${lon};`);
                    
                    scene.appendChild(newText);
                    status.innerText = "پیام شما در این مختصات کاشته شد!";
                    
                    // بازگشت وضعیت به حالت عادی بعد از ۳ ثانیه
                    setTimeout(() => { status.innerText = "آماده برای ثبت پیام بعدی..."; }, 3000);
                }
            }, (err) => {
                alert("خطا در دریافت مکان: " + err.message);
            }, { enableHighAccuracy: true });
        });

        // اطلاع‌رسانی لود شدن سیستم
        window.addEventListener('gps-entity-place-added', () => {
            status.innerText = "سیستم آماده است. پیام‌های اطراف بارگذاری شدند.";
        });
    </script>
</body>
</html>
