<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>AR Ground Square</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap');

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --accent: #00d4ff;
      --accent2: #0066ff;
      --bg: #07090f;
      --surface: #0e1218;
      --border: rgba(255,255,255,0.08);
      --text: #e8eaf0;
      --muted: #5a6070;
    }

    html, body {
      width: 100%; height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      overflow: hidden;
    }

    /* ── Landing screen ── */
    #landing {
      width: 100%; height: 100%;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 2rem;
      gap: 0;
      position: relative;
    }

    .grid-bg {
      position: absolute; inset: 0;
      background-image:
        linear-gradient(rgba(0,212,255,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,212,255,0.04) 1px, transparent 1px);
      background-size: 48px 48px;
      mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 30%, transparent 100%);
    }

    .square-preview {
      width: 120px; height: 120px;
      border: 1.5px solid var(--accent);
      position: relative;
      margin-bottom: 2.5rem;
      animation: pulse 3s ease-in-out infinite;
    }

    .square-preview::before, .square-preview::after {
      content: '';
      position: absolute;
      width: 16px; height: 16px;
      border-color: white;
      border-style: solid;
    }
    .square-preview::before { top: -3px; left: -3px; border-width: 2px 0 0 2px; }
    .square-preview::after  { bottom: -3px; right: -3px; border-width: 0 2px 2px 0; }

    .inner-dot {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
    }
    .inner-dot::after {
      content: '';
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 12px var(--accent);
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(0,212,255,0.3), inset 0 0 0 0 rgba(0,212,255,0.05); }
      50%       { box-shadow: 0 0 32px 4px rgba(0,212,255,0.12), inset 0 0 40px rgba(0,212,255,0.07); }
    }

    h1 {
      font-family: 'DM Mono', monospace;
      font-size: clamp(1.1rem, 5vw, 1.5rem);
      font-weight: 500;
      letter-spacing: -0.02em;
      color: var(--text);
      margin-bottom: 0.6rem;
      text-align: center;
    }

    .subtitle {
      font-size: 0.85rem;
      color: var(--muted);
      font-family: 'DM Mono', monospace;
      margin-bottom: 2.5rem;
      text-align: center;
    }

    #launch-btn {
      position: relative;
      padding: 14px 36px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      font-weight: 500;
      color: var(--bg);
      background: var(--accent);
      border: none;
      border-radius: 4px;
      cursor: pointer;
      letter-spacing: 0.01em;
      transition: transform 0.15s, box-shadow 0.15s;
    }
    #launch-btn:active { transform: scale(0.97); }
    #launch-btn:hover  { box-shadow: 0 0 24px rgba(0,212,255,0.4); }

    /* iOS anchor tag trick */
    #ios-link {
      display: none;
      position: relative;
      padding: 14px 36px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      font-weight: 500;
      color: var(--bg);
      background: var(--accent);
      border-radius: 4px;
      text-decoration: none;
      letter-spacing: 0.01em;
    }
    #ios-link[rel~="ar"] > img {
      /* required by Safari — hidden 1px image */
      width: 1px; height: 1px;
      position: absolute; opacity: 0;
    }

    .platform-tag {
      margin-top: 1.5rem;
      font-size: 0.75rem;
      font-family: 'DM Mono', monospace;
      color: var(--muted);
    }
    .platform-tag span {
      color: var(--accent);
    }

    /* ── Status overlay (Android WebXR) ── */
    #overlay {
      position: fixed; inset: 0;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      padding-bottom: 48px;
      pointer-events: none;
      z-index: 100;
    }
    #overlay.active { display: flex; }

    #status-box {
      font-family: 'DM Mono', monospace;
      font-size: 0.78rem;
      color: white;
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.1);
      padding: 10px 20px;
      border-radius: 40px;
      text-align: center;
      max-width: 300px;
      margin-bottom: 16px;
      pointer-events: none;
    }

    #exit-btn {
      pointer-events: all;
      padding: 10px 28px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem;
      font-weight: 500;
      background: rgba(255,255,255,0.12);
      color: white;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 40px;
      cursor: pointer;
    }

    #canvas-container canvas {
      display: block;
      position: fixed; inset: 0;
    }
  </style>
</head>
<body>

<!-- Landing -->
<div id="landing">
  <div class="grid-bg"></div>

  <div class="square-preview">
    <div class="inner-dot"></div>
  </div>

  <h1>AR Ground Square</h1>
  <p class="subtitle">1 × 1 meter · locked to floor</p>

  <!-- Android button -->
  <button id="launch-btn" style="display:none">Launch AR</button>

  <!-- iOS Quick Look anchor (Safari requirement: must be <a rel="ar">) -->
  <a id="ios-link" rel="ar" href="square.usdz">
    <img src="" alt="">
    Launch AR
  </a>

  <p class="platform-tag" id="platform-label">detecting device…</p>
</div>

<!-- Android WebXR overlay -->
<div id="overlay">
  <div id="status-box">point camera at the floor</div>
  <button id="exit-btn">Exit AR</button>
</div>

<div id="canvas-container"></div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js"
  }
}
</script>

<script type="module">
import * as THREE from 'three';

/* ── Device detection ── */
const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent) ||
              (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);

const platformLabel = document.getElementById('platform-label');
const launchBtn     = document.getElementById('launch-btn');
const iosLink       = document.getElementById('ios-link');

if (isIOS) {
  iosLink.style.display = 'inline-block';
  platformLabel.innerHTML = 'iOS · <span>Quick Look</span>';
} else {
  launchBtn.style.display = 'inline-block';
  platformLabel.innerHTML = 'Android · <span>WebXR</span>';
  launchBtn.addEventListener('click', startWebXR);
}

/* ══════════════════════════════════════════
   ANDROID — WebXR
══════════════════════════════════════════ */
let camera, scene, renderer;
let hitTestSource = null;
let localSpace    = null;
let anchor        = null;
let reticle       = null;
let squareMesh    = null;
let xrSession     = null;
let placed        = false;

const overlay    = document.getElementById('overlay');
const statusBox  = document.getElementById('status-box');
const exitBtn    = document.getElementById('exit-btn');

exitBtn.addEventListener('click', () => { if (xrSession) xrSession.end(); });

function initThree() {
  scene    = new THREE.Scene();
  camera   = new THREE.PerspectiveCamera(70, innerWidth / innerHeight, 0.01, 30);
  renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
  renderer.setPixelRatio(devicePixelRatio);
  renderer.setSize(innerWidth, innerHeight);
  renderer.xr.enabled = true;
  renderer.setClearColor(0x000000, 0);
  document.getElementById('canvas-container').appendChild(renderer.domElement);

  scene.add(new THREE.AmbientLight(0xffffff, 1.2));
  const d = new THREE.DirectionalLight(0xffffff, 1.5);
  d.position.set(1, 3, 1);
  scene.add(d);

  /* Reticle */
  reticle = new THREE.Group();
  reticle.add(new THREE.Mesh(
    new THREE.RingGeometry(0.07, 0.09, 32),
    new THREE.MeshBasicMaterial({ color: 0x00d4ff, side: THREE.DoubleSide })
  ));
  reticle.add(new THREE.Mesh(
    new THREE.CircleGeometry(0.018, 16),
    new THREE.MeshBasicMaterial({ color: 0xffffff })
  ));
  reticle.rotation.x = -Math.PI / 2;
  reticle.visible = false;
  scene.add(reticle);

  /* 1×1 m square */
  squareMesh = buildSquare();
  squareMesh.visible = false;
  scene.add(squareMesh);

  window.addEventListener('resize', () => {
    camera.aspect = innerWidth / innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
  });
}

function buildSquare() {
  const g = new THREE.Group();

  /* Fill */
  const fill = new THREE.Mesh(
    new THREE.PlaneGeometry(1, 1),
    new THREE.MeshStandardMaterial({
      color: 0x00aaff, transparent: true,
      opacity: 0.22, side: THREE.DoubleSide, depthWrite: false
    })
  );
  fill.rotation.x = -Math.PI / 2;
  g.add(fill);

  /* Edges */
  const edges = new THREE.LineSegments(
    new THREE.EdgesGeometry(new THREE.PlaneGeometry(1, 1)),
    new THREE.LineBasicMaterial({ color: 0x00d4ff, linewidth: 2 })
  );
  edges.rotation.x = -Math.PI / 2;
  g.add(edges);

  /* Corner marks */
  const cMat = new THREE.LineBasicMaterial({ color: 0xffffff, linewidth: 3 });
  const L = 0.1, H = 0.5;
  [[-H,-H],[H,-H],[-H,H],[H,H]].forEach(([x,z]) => {
    const dx = x > 0 ? -L : L, dz = z > 0 ? -L : L;
    [[x,z,x+dx,z],[x,z,x,z+dz]].forEach(([x1,z1,x2,z2]) => {
      const ln = new THREE.Line(
        new THREE.BufferGeometry().setFromPoints([
          new THREE.Vector3(x1,0,z1), new THREE.Vector3(x2,0,z2)
        ]), cMat
      );
      ln.rotation.x = -Math.PI / 2;
      g.add(ln);
    });
  });

  g.position.y = 0.002;
  return g;
}

async function startWebXR() {
  if (!navigator.xr) return alert('WebXR not supported on this browser.');
  if (!await navigator.xr.isSessionSupported('immersive-ar')) return alert('AR not supported on this device.');

  document.getElementById('landing').style.display = 'none';
  overlay.classList.add('active');
  initThree();

  try {
    xrSession = await navigator.xr.requestSession('immersive-ar', {
      requiredFeatures: ['hit-test', 'local-floor'],
      optionalFeatures: ['anchors', 'dom-overlay'],
      domOverlay: { root: overlay }
    });

    renderer.xr.setReferenceSpaceType('local-floor');
    await renderer.xr.setSession(xrSession);
    xrSession.addEventListener('end', onEnd);

    localSpace = await xrSession.requestReferenceSpace('local-floor');
    const viewerSpace = await xrSession.requestReferenceSpace('viewer');
    hitTestSource = await xrSession.requestHitTestSource({ space: viewerSpace });

    document.addEventListener('click', onTap);
    renderer.setAnimationLoop(onFrame);

  } catch (e) {
    alert('Error: ' + e.message);
    onEnd();
  }
}

function onTap() {
  if (!reticle.visible || placed) return;
  placed = true;

  const pos = new THREE.Vector3();
  reticle.getWorldPosition(pos);
  squareMesh.position.set(pos.x, 0, pos.z);
  squareMesh.visible = true;
  reticle.visible = false;

  /* Try to create an anchor for world-locked stability */
  if (xrSession && xrSession.createAnchor) {
    const frame = renderer.xr.getFrame();
    if (frame) {
      frame.createAnchor(
        new XRRigidTransform({ x: pos.x, y: 0, z: pos.z, w: 1 }, { x:0,y:0,z:0,w:1 }),
        localSpace
      ).then(a => {
        anchor = a;
        statusBox.textContent = 'square locked ✓ — move freely';
      }).catch(() => {
        statusBox.textContent = 'square placed — move freely';
      });
    }
  } else {
    statusBox.textContent = 'square placed — move freely';
  }
}

const _mat4 = new THREE.Matrix4();

function onFrame(ts, frame) {
  if (!frame) return;

  /* Hit-test for reticle */
  if (!placed && hitTestSource) {
    const hits = frame.getHitTestResults(hitTestSource);
    if (hits.length) {
      const pose = hits[0].getPose(localSpace);
      if (pose) {
        reticle.visible = true;
        _mat4.fromArray(pose.transform.matrix);
        reticle.position.setFromMatrixPosition(_mat4);
      }
    } else {
      reticle.visible = false;
    }
  }

  /* Update square from anchor if available */
  if (anchor && frame.trackedAnchors && frame.trackedAnchors.has(anchor)) {
    const ap = frame.getPose(anchor.anchorSpace, localSpace);
    if (ap) {
      _mat4.fromArray(ap.transform.matrix);
      squareMesh.position.setFromMatrixPosition(_mat4);
      squareMesh.position.y = 0;
    }
  }

  renderer.render(scene, camera);
}

function onEnd() {
  xrSession = null; anchor = null;
  hitTestSource = null; placed = false;
  renderer.setAnimationLoop(null);
  overlay.classList.remove('active');
  document.getElementById('landing').style.display = 'flex';
  document.removeEventListener('click', onTap);
}
</script>
</body>
</html>

<html lang="fa">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AR Ground Square</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; font-family: sans-serif; }
    #overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      display: flex; flex-direction: column;
      align-items: center; justify-content: flex-end;
      padding-bottom: 40px; pointer-events: none; z-index: 10;
    }
    #start-btn {
      padding: 14px 32px; font-size: 16px; border-radius: 50px;
      background: rgba(255,255,255,0.9); border: none; cursor: pointer;
      pointer-events: all; font-weight: 600; color: #111;
    }
    #status {
      color: white; font-size: 14px; margin-bottom: 16px;
      background: rgba(0,0,0,0.5); padding: 8px 16px;
      border-radius: 20px; text-align: center; max-width: 280px;
    }
    #reticle {
      position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%);
      width: 32px; height: 32px; pointer-events: none; display: none; z-index: 5;
    }
  </style>
</head>
<body>
<div id="overlay">
  <div id="status">برای شروع، دکمه را فشار دهید</div>
  <button id="start-btn">شروع تجربه AR</button>
</div>

<!-- نشانگر هدف‌گیری روی زمین -->
<svg id="reticle" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <circle cx="50" cy="50" r="40" stroke="white" stroke-width="5"
    fill="rgba(255,255,255,0.2)" stroke-dasharray="10 5"/>
  <circle cx="50" cy="50" r="5" fill="white"/>
</svg>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';

/* ────────── متغیرهای اصلی ────────── */
let camera, scene, renderer;
let xrSession = null;
let hitTestSource = null;
let localSpace = null;
let anchor = null;        // قفل ثابت به دنیای واقعی
let squareMesh = null;
let reticleGroup = null;  // نشانگر موقعیت
let hitTestActive = false;
const statusEl = document.getElementById('status');
const startBtn = document.getElementById('start-btn');
const reticleSvg = document.getElementById('reticle');

/* ────────── راه‌اندازی صحنه Three.js ────────── */
function init() {
  scene = new THREE.Scene();

  camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 20);

  renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
  renderer.setPixelRatio(window.devicePixelRatio);
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.xr.enabled = true;
  renderer.setClearColor(0x000000, 0);
  document.body.appendChild(renderer.domElement);

  /* نور */
  scene.add(new THREE.AmbientLight(0xffffff, 1));
  const dir = new THREE.DirectionalLight(0xffffff, 1.5);
  dir.position.set(1, 2, 1);
  scene.add(dir);

  /* نشانگر هدف‌گیری (reticle) */
  reticleGroup = new THREE.Group();
  const reticleMat = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.6, side: THREE.DoubleSide });
  const outerRing = new THREE.Mesh(
    new THREE.RingGeometry(0.08, 0.10, 32),
    reticleMat
  );
  const innerDot = new THREE.Mesh(
    new THREE.CircleGeometry(0.02, 16),
    new THREE.MeshBasicMaterial({ color: 0xffffff })
  );
  outerRing.rotation.x = -Math.PI / 2;
  innerDot.rotation.x = -Math.PI / 2;
  reticleGroup.add(outerRing);
  reticleGroup.add(innerDot);
  reticleGroup.visible = false;
  scene.add(reticleGroup);

  /* مربع یک در یک متر (خط‌های کناری + کمی شفاف) */
  squareMesh = buildSquare();
  squareMesh.visible = false;
  scene.add(squareMesh);

  window.addEventListener('resize', onResize);
  startBtn.addEventListener('click', startAR);
}

/* ────────── ساخت مربع ────────── */
function buildSquare() {
  const group = new THREE.Group();

  /* سطح شفاف */
  const fill = new THREE.Mesh(
    new THREE.PlaneGeometry(1, 1),
    new THREE.MeshStandardMaterial({
      color: 0x00aaff,
      transparent: true,
      opacity: 0.25,
      side: THREE.DoubleSide,
      depthWrite: false
    })
  );
  fill.rotation.x = -Math.PI / 2;

  /* حاشیه */
  const edges = new THREE.LineSegments(
    new THREE.EdgesGeometry(new THREE.PlaneGeometry(1, 1)),
    new THREE.LineBasicMaterial({ color: 0x00ccff, linewidth: 2 })
  );
  edges.rotation.x = -Math.PI / 2;

  /* گوشه‌های تزئینی */
  const corners = makeCorners();

  group.add(fill);
  group.add(edges);
  group.add(corners);
  group.position.y = 0.001; /* کمی بالاتر از زمین */
  return group;
}

function makeCorners() {
  const group = new THREE.Group();
  const mat = new THREE.LineBasicMaterial({ color: 0xffffff, linewidth: 3 });
  const size = 0.12;
  const half = 0.5;
  const positions = [
    [-half, -half, 1, 0], [-half, half, 1, 0],
    [half, -half, -1, 0], [half, half, -1, 0],
    [-half, -half, 0, 1], [-half, half, 0, 1],
    [half, -half, 0, -1], [half, half, 0, -1],
  ];
  positions.forEach(([x, z, dx, dz]) => {
    const pts = [
      new THREE.Vector3(x, 0, z),
      new THREE.Vector3(x + dx * size, 0, z + dz * size)
    ];
    const line = new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts), mat);
    line.rotation.x = -Math.PI / 2;
    group.add(line);
  });
  return group;
}

/* ────────── شروع AR ────────── */
async function startAR() {
  if (!navigator.xr) {
    statusEl.textContent = 'WebXR پشتیبانی نمی‌شود. از Chrome/Safari بروزرسان استفاده کنید.';
    return;
  }
  const supported = await navigator.xr.isSessionSupported('immersive-ar');
  if (!supported) {
    statusEl.textContent = 'AR روی این دستگاه پشتیبانی نمی‌شود.';
    return;
  }

  statusEl.textContent = 'در حال بارگذاری AR...';
  startBtn.style.display = 'none';

  try {
    xrSession = await navigator.xr.requestSession('immersive-ar', {
      requiredFeatures: ['hit-test', 'local-floor'],
      optionalFeatures: ['anchors', 'dom-overlay'],
      domOverlay: { root: document.getElementById('overlay') }
    });

    renderer.xr.setReferenceSpaceType('local-floor');
    await renderer.xr.setSession(xrSession);

    xrSession.addEventListener('end', onSessionEnd);
    localSpace = await xrSession.requestReferenceSpace('local-floor');

    /* Hit-test برای یافتن سطح زمین */
    const viewerSpace = await xrSession.requestReferenceSpace('viewer');
    hitTestSource = await xrSession.requestHitTestSource({ space: viewerSpace });
    hitTestActive = true;

    statusEl.textContent = 'دوربین را به سمت زمین بگیرید، سپس روی نشانگر ضربه بزنید';

    /* لمس روی صفحه = قرار دادن مربع */
    document.addEventListener('click', placeSquare, { once: false });
    renderer.setAnimationLoop(onFrame);

  } catch (err) {
    statusEl.textContent = 'خطا: ' + err.message;
    startBtn.style.display = '';
  }
}

/* ────────── قرار دادن مربع و قفل کردن به Anchor ────────── */
async function placeSquare() {
  if (!reticleGroup.visible) return;

  const pos = new THREE.Vector3();
  const quat = new THREE.Quaternion();
  reticleGroup.getWorldPosition(pos);
  reticleGroup.getWorldQuaternion(quat);

  squareMesh.position.copy(pos);
  squareMesh.position.y = 0;
  squareMesh.quaternion.copy(quat);
  squareMesh.visible = true;

  /* تلاش برای ایجاد Anchor (قفل ثابت) */
  if (xrSession.createAnchor) {
    try {
      const frame = renderer.xr.getFrame();
      const pose = new XRRigidTransform(
        { x: pos.x, y: 0, z: pos.z, w: 1 },
        { x: 0, y: 0, z: 0, w: 1 }
      );
      anchor = await frame.createAnchor(pose, localSpace);
      hitTestActive = false;
      reticleGroup.visible = false;
      reticleSvg.style.display = 'none';
      statusEl.textContent = 'مربع قفل شد ✓ می‌توانید آزادانه حرکت کنید';
      document.removeEventListener('click', placeSquare);
    } catch (e) {
      /* اگر Anchor در دسترس نبود، موقعیت ثابت در صحنه می‌ماند */
      statusEl.textContent = 'مربع قرار گرفت (بدون Anchor)';
    }
  } else {
    statusEl.textContent = 'مربع قرار گرفت';
  }
}

/* ────────── حلقه اصلی رندر ────────── */
function onFrame(timestamp, frame) {
  if (!frame) return;

  /* Hit-test: یافتن موقعیت زمین */
  if (hitTestActive && hitTestSource) {
    const hits = frame.getHitTestResults(hitTestSource);
    if (hits.length > 0) {
      const hit = hits[0];
      const pose = hit.getPose(localSpace);
      if (pose) {
        reticleGroup.visible = true;
        reticleSvg.style.display = 'block';
        reticleGroup.position.setFromMatrixPosition(new THREE.Matrix4().fromArray(pose.transform.matrix));
        reticleGroup.quaternion.setFromRotationMatrix(new THREE.Matrix4().fromArray(pose.transform.matrix));
      }
    } else {
      reticleGroup.visible = false;
    }
  }

  /* اگر Anchor داریم، موقعیت مربع را به Anchor قفل می‌کنیم */
  if (anchor) {
    const anchorPoses = frame.trackedAnchors;
    if (anchorPoses && anchorPoses.has(anchor)) {
      const anchorPose = frame.getPose(anchor.anchorSpace, localSpace);
      if (anchorPose) {
        const m = new THREE.Matrix4().fromArray(anchorPose.transform.matrix);
        squareMesh.position.setFromMatrixPosition(m);
        squareMesh.position.y = 0;
      }
    }
  }

  renderer.render(scene, camera);
}

/* ────────── رویدادها ────────── */
function onSessionEnd() {
  xrSession = null;
  anchor = null;
  hitTestSource = null;
  hitTestActive = false;
  squareMesh.visible = false;
  reticleGroup.visible = false;
  renderer.setAnimationLoop(null);
  startBtn.style.display = '';
  statusEl.textContent = 'برای شروع، دکمه را فشار دهید';
}

function onResize() {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
}

init();
</script>
</body>
</html>
