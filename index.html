<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>Hidden Memories XR Clean</title>
<style>
html,body{margin:0;padding:0;width:100%;height:100%;overflow:hidden;background:#07090f;color:#fff;font-family:Arial,sans-serif}#landing{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;background:#07090f;z-index:10}h1{margin:0;font-size:28px}button{padding:14px 28px;border:0;border-radius:10px;background:#00d4ff;color:#000;font-weight:700;font-size:16px}#status{position:fixed;left:50%;bottom:20px;transform:translateX(-50%);background:rgba(0,0,0,.65);padding:10px 16px;border-radius:999px;z-index:20}canvas{position:fixed;inset:0}
</style>
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
</head>
<body>
<div id="landing"><h1>Hidden Memories</h1><button id="enter">Enter AR</button></div>
<div id="status">Ready</div>
<script>
const firebaseConfig={apiKey:"AIzaSyB_b5em8duOmdyNF006-BR1rSCIGNriCtk",authDomain:"hidden-memories-27f1a.firebaseapp.com",projectId:"hidden-memories-27f1a",storageBucket:"hidden-memories-27f1a.firebasestorage.app",messagingSenderId:"61920134607",appId:"1:61920134607:web:e62e0b4b3f947985b6beba"};
firebase.initializeApp(firebaseConfig);
firebase.firestore();
let scene,camera,renderer,session,cube;
const landing=document.getElementById('landing');
const statusEl=document.getElementById('status');
function init3D(){scene=new THREE.Scene();camera=new THREE.PerspectiveCamera(70,innerWidth/innerHeight,.01,20);renderer=new THREE.WebGLRenderer({antialias:true,alpha:true});renderer.setPixelRatio(window.devicePixelRatio||1);renderer.setSize(innerWidth,innerHeight);renderer.xr.enabled=true;document.body.appendChild(renderer.domElement);scene.add(new THREE.AmbientLight(0xffffff,2));cube=new THREE.Mesh(new THREE.BoxGeometry(.12,.12,.12),new THREE.MeshNormalMaterial());cube.position.set(0,0,-0.6);scene.add(cube);window.addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight);});}
async function startAR(){try{if(typeof THREE==='undefined'){statusEl.textContent='Three.js failed';return;}if(!navigator.xr){statusEl.textContent='WebXR unsupported';return;}landing.style.display='none';statusEl.textContent='Starting AR...';init3D();session=await navigator.xr.requestSession('immersive-ar',{optionalFeatures:['local-floor','hit-test']});await renderer.xr.setSession(session);session.addEventListener('end',()=>location.reload());renderer.setAnimationLoop(loop);statusEl.textContent='AR Running';}catch(err){statusEl.textContent='Error: '+err.message;landing.style.display='flex';}}
function loop(){if(cube){cube.rotation.x+=0.01;cube.rotation.y+=0.015;}renderer.render(scene,camera);}
document.getElementById('enter').addEventListener('click',startAR);
</script>
</body>
</html>
