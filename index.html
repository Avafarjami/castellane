<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Fixed AR Square</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        body { margin: 0; background: #f0f0f0; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; font-family: sans-serif; }
        model-viewer { width: 100%; height: 80vh; background-color: #eee; }
        .controls { padding: 20px; text-align: center; }
        #ar-button {
            background-color: #007bff; color: white; border: none;
            padding: 15px 30px; border-radius: 30px; font-size: 18px; font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="controls">
        <h2>پروژه مربع ۱ در ۱</h2>
        <p>روی دکمه زیر بزنید و گوشی را به سمت زمین بگیرید</p>
    </div>

    <model-viewer 
        src="https://modelviewer.dev/shared-assets/models/glTFSampleModels/Square/Square.gltf" 
        ar 
        ar-modes="webxr scene-viewer quick-look" 
        camera-controls 
        shadow-intensity="1" 
        alt="A 1x1 meter square">
        
        <button slot="ar-button" id="ar-button">
            مشاهده در محیط شما (AR)
        </button>

    </model-viewer>

    <div style="padding: 20px; font-size: 12px; color: #666;">
        نکته: در آیفون، بعد از زدن دکمه، دوربین باز می‌شود؛ گوشی را کمی تکان دهید تا زمین را بشناسد.
    </div>

</body>
</html>
