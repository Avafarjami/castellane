<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>Hidden Memories XR Viewer</title>
<style>
html,body{margin:0;height:100%;overflow:hidden;background:#07090f;color:#fff;font-family:Arial,sans-serif}#landing{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px}button{padding:14px 28px;border:0;border-radius:8px;background:#00d4ff;color:#000;font-weight:700}#status{position:fixed;left:50%;bottom:20px;transform:translateX(-50%);background:rgba(0,0,0,.6);padding:10px 16px;border-radius:999px}#input{position:fixed;left:50%;bottom:70px;transform:translateX(-50%);display:none}.show{display:block}
</style>
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
</head>
<body>
<div id="landing"><h1>Hidden Memories</h1><button id="enter">Enter AR</button></div>
<div id="input"><input id="msg" maxlength="30"><button id="send">Send</button></div>
<div id="status">Ready</div>
<script>
const firebaseConfig={apiKey:"AIzaSyB_b5em8duOmdyNF006-BR1rSCIGNriCtk",authDomain:"hidden-memories-27f1a.firebaseapp.com",projectId:"hidden-memories-27f1a",storageBucket:"hidden-memories-27f1a.firebasestorage.app",messagingSenderId:"61920134607",appId:"1:61920134607:web:e62e0b4b3f947985b6beba"};firebase.initializeApp(firebaseConfig);const db=firebase.firestore();const col=db.collection('messages');
let scene,camera,renderer,session,reticle,placed=false,hitTestSource,refSpace;
const landing=document.getElementById('landing');const statusEl=document.getElementById('status');const input=document.getElementById('input');
function init3D(){scene=new THREE.Scene();camera=new THREE.PerspectiveCamera(70,innerWidth/innerHeight,.01,20);renderer=new THREE.WebGLRenderer({antialias:true,preserveDrawingBuffer:true});renderer.setSize(innerWidth,innerHeight);renderer.xr.enabled=true;document.body.appendChild(renderer.domElement);scene.add(new THREE.AmbientLight(0xffffff,1.5));reticle=new THREE.Mesh(new THREE.RingGeometry(.07,.09,32),new THREE.MeshBasicMaterial({color:0x00d4ff}));reticle.rotation.x=-Math.PI/2;reticle.visible=false;scene.add(reticle)}
async function startAR(){try{if(typeof THREE==='undefined'){alert('Three.js failed to load');return;}if(!navigator.xr){alert('WebXR not supported');return;}landing.style.display='none';statusEl.textContent='Requesting AR';init3D();session=await navigator.xr.requestSession('immersive-ar',{optionalFeatures:['hit-test','local-floor']});renderer.xr.setSession(session);const viewer=await session.requestReferenceSpace('viewer');refSpace=await session.requestReferenceSpace('local');hitTestSource=await session.requestHitTestSource({space:viewer});session.addEventListener('end',()=>location.reload());renderer.setAnimationLoop(frame);statusEl.textContent='Tap floor to place';document.addEventListener('click',place);}catch(e){statusEl.textContent=e.message;landing.style.display='flex';}}
function place(e){if(!reticle.visible||placed)return;placed=true;input.classList.add('show');statusEl.textContent='Placed';}
function frame(t,frame){if(frame&&hitTestSource&&!placed){const hits=frame.getHitTestResults(hitTestSource);if(hits.length){const pose=hits[0].getPose(refSpace);reticle.visible=true;reticle.position.set(pose.transform.position.x,pose.transform.position.y,pose.transform.position.z);}}renderer.render(scene,camera)}
document.getElementById('enter').onclick=startAR;
</script>
</body>
</html>
