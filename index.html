<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Fixed Geo-AR - No Freeze</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>
    <script src="https://unpkg.com/aframe-look-at-component@0.8.0/dist/aframe-look-at-component.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; }
        /* استایل پنل ثبت پیام برای جلوگیری از فریز شدن دوربین */
        #input-panel {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            z-index: 1000; background: rgba(0,0,0,0.8); padding: 15px;
            border-radius: 15px; display: flex; flex-direction: column; width: 80%;
        }
        input { padding: 12px; border-radius: 8px; border: none; margin-bottom: 10px; font-size: 16px; }
        button { padding: 12px; background: #2196F3; color: white; border: none; border-radius: 8px; font-weight: bold; }
        #status { position: absolute; top: 10px; width: 100%; text-align: center; color: white; z-index: 1000; font-size: 12px; }
    </style>
</head>

<body>
    <div id="status">در حال اسکن GPS...</div>

    <div id="input-panel">
        <input type="text" id="message-text" placeholder="پیام خود را اینجا بنویسید...">
        <button id="add-btn">ثبت پیام در این نقطه جغرافیایی</button>
    </div>

    <a-scene 
        vr-mode-ui="enabled: false"
        embedded 
        arjs="sourceType: webcam; debugUIEnabled: false; videoTexture: true;">
        
        <a-camera gps-camera="minDistance: 5; maxDistance: 1000;" rotation-reader></a-camera>

        <a-text
            value="Place Castellane"
            scale="20 20 20"
            look-at="[gps-camera]"
            gps-entity-place="latitude: 43.2858; longitude: 5.3840;"
            color="yellow"
            align="center">
        </a-text>

    </a-scene>

    <script>
        const addBtn = document.getElementById('add-btn');
        const inputField = document.getElementById('message-text');
        const status = document.getElementById('status');

        // فعال سازی سنسورهای آیفون
        window.onclick = () => {
            if (typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission();
            }
        };

        addBtn.addEventListener('click', () => {
            const text = inputField.value;
            if (!text) { alert("لطفا متنی بنویسید"); return; }

            status.innerText = "در حال دریافت مختصات...";
            
            navigator.geolocation.getCurrentPosition((pos) => {
                const lat = pos.coords.latitude;
                const lon = pos.coords.longitude;

                const scene = document.querySelector('a-scene');
                const entity = document.createElement('a-text');
                
                entity.setAttribute('value', text);
                entity.setAttribute('gps-entity-place', `latitude: ${lat}; longitude: ${lon};`);
                entity.setAttribute('look-at', '[gps-camera]');
                entity.setAttribute('color', '#00FF00');
                entity.setAttribute('align', 'center');
                
                // مقیاس بسیار کوچک در ابتدا که با نزدیک شدن بزرگ شود
                entity.setAttribute('scale', '15 15 15'); 

                scene.appendChild(entity);
                
                inputField.value = "";
                status.innerText = "پیام با موفقیت در هوا معلق شد!";
                setTimeout(() => { status.innerText = ""; }, 3000);
            }, (err) => {
                alert("خطای GPS: " + err.message);
            }, { enableHighAccuracy: true });
        });
    </script>
</body>
</html>
