<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>AR Memorial - Ground Layout 10x10</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>
    <script src="https://unpkg.com/aframe-text-geometry-component@0.5.1/dist/aframe-text-geometry-component.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; }
        #ui-panel {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            z-index: 1000; background: rgba(255, 255, 255, 0.9); padding: 15px;
            border-radius: 20px; display: flex; flex-direction: column; width: 85%;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        input { padding: 12px; border: 1px solid #ccc; border-radius: 10px; margin-bottom: 10px; font-size: 16px; }
        button { padding: 12px; background: #000; color: white; border: none; border-radius: 10px; font-weight: bold; }
        #info { position: absolute; top: 10px; width: 100%; text-align: center; color: black; background: rgba(255,255,255,0.7); z-index: 1000; font-size: 12px; }
    </style>
</head>

<body style="margin: 0; overflow: hidden;">
    <div id="info">دوربین را به سمت زمین بگیرید و قدم بزنید تا پیام‌های وسیع را کشف کنید... برای فعال‌سازی سنسورها یکبار روی صفحه بزنید</div>

    <div id="ui-panel">
        <input type="text" id="user-msg" placeholder="add your memory..">
        <button id="post-btn">حک کردن پیام روی زمین (۱۰ در ۱۰ متر)</button>
    </div>

    <a-scene 
        vr-mode-ui="enabled: false"
        embedded 
        arjs="sourceType: webcam; debugUIEnabled: false;">
        
        <a-camera gps-camera="minDistance: 1; maxDistance: 200;" rotation-reader></a-camera>

        <a-entity 
            id="castellane-memorial-ground"
            rotation="-90 0 0" 
            gps-entity-place="latitude: 43.28585; longitude: 5.38405;">
            
            <a-entity 
                text-geometry="value: I WAS HERE. THIS IS A CITY LEGACY. STEP FORWARD TO READ. CASTELLANE MEMORIAL PROJECT.; font: https://unpkg.com/aframe-text-geometry-component@0.5.1/examples/assets/roboto_mono_thin.typeface.json; align: center; curveSegments: 12; height: 0.01;" 
                material="color: black;" 
                scale="2 2 2"
                position="-5 0 0">
                </a-entity>
        </a-entity>

    </a-scene>

    <script>
        const postBtn = document.getElementById('post-btn');
        const userInp = document.getElementById('user-msg');
        const info = document.getElementById('info');

        window.onclick = () => {
            if (typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission();
            }
        };

        postBtn.addEventListener('click', () => {
            const val = userInp.value;
            if (!val) return;

            info.innerText = "در حال دریافت موقعیت و محاسبه چیدمان وسیع...";

            navigator.geolocation.getCurrentPosition((pos) => {
                // قرار دادن در ۱۰ متری کاربر (برای اینکه راحت‌تر پیدا شود)
                const lat = pos.coords.latitude + 0.0001; 
                const lon = pos.coords.longitude;

                const scene = document.querySelector('a-scene');
                
                // ساختن یک کانتینر برای چیدمان وسیع
                const container = document.createElement('a-entity');
                container.setAttribute('rotation', '-90 0 0');
                container.setAttribute('gps-entity-place', `latitude: ${lat}; longitude: ${lon};`);

                // ساختن خود متن وسیع
                const newEl = document.createElement('a-entity');
                
                // استفاده از text-geometry برای رندر متن وسیع
                // مهم: عرض پاراگراف را با 'curveSegments' و 'scale' طوری تنظیم می‌کنیم که در حدود ۱۰ متر پهن شود.
                newEl.setAttribute('text-geometry', {
                    value: val,
                    font: "https://unpkg.com/aframe-text-geometry-component@0.5.1/examples/assets/roboto_mono_thin.typeface.json",
                    align: "center",
                    curveSegments: 12, // پیچیدگی فونت برای بهینه‌سازی
                    height: 0.01 // ارتفاع ناچیز برای حس حکاکی روی زمین
                });
                
                newEl.setAttribute('material', { color: '#222' }); // خاکستری تیره
                newEl.setAttribute('scale', '1.5 1.5 1.5'); // سایز ظریف
                newEl.setAttribute('position', '-5 0 0'); // تنظیم مرکز پیام

                container.appendChild(newEl);
                scene.appendChild(container);
                
                userInp.value = "";
                info.innerText = "پیام وسیع شما روی زمین حک شد! قدم بزنید تا بخوانید.";
                setTimeout(() => { info.innerText = "به سمت پیام حرکت کنید..."; }, 3000);

            }, (err) => {
                alert("GPS Error: " + err.message);
            }, { enableHighAccuracy: true });
        });
    </script>
</body>
</html>
