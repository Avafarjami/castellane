<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Hidden Memories</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap');

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --accent: #00d4ff;
      --bg: #07090f;
      --text: #e8eaf0;
      --muted: #5a6070;
    }

    html, body {
      width: 100%; height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      overflow: hidden;
    }

    #landing {
      width: 100%; height: 100%;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 2rem; position: relative;
    }

    .grid-bg {
      position: absolute; inset: 0;
      background-image:
        linear-gradient(rgba(0,212,255,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,212,255,0.04) 1px, transparent 1px);
      background-size: 48px 48px;
      mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 30%, transparent 100%);
    }

    .square-preview {
      width: 100px; height: 100px;
      border: 1.5px solid var(--accent);
      position: relative; margin-bottom: 2rem;
      animation: pulse 3s ease-in-out infinite;
    }
    .square-preview::before, .square-preview::after {
      content: ''; position: absolute;
      width: 14px; height: 14px;
      border-color: white; border-style: solid;
    }
    .square-preview::before { top: -3px; left: -3px; border-width: 2px 0 0 2px; }
    .square-preview::after  { bottom: -3px; right: -3px; border-width: 0 2px 2px 0; }

    @keyframes pulse {
      0%,100% { box-shadow: 0 0 0 0 rgba(0,212,255,0.3); }
      50%      { box-shadow: 0 0 32px 4px rgba(0,212,255,0.12); }
    }

    h1 {
      font-family: 'DM Mono', monospace;
      font-size: clamp(1.1rem, 5vw, 1.4rem);
      font-weight: 500; margin-bottom: 0.4rem; text-align: center;
    }
    .subtitle {
      font-size: 0.8rem; color: var(--muted);
      font-family: 'DM Mono', monospace;
      margin-bottom: 2rem; text-align: center;
    }

    #launch-btn {
      padding: 14px 36px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem; font-weight: 500;
      color: var(--bg); background: var(--accent);
      border: none; border-radius: 4px; cursor: pointer;
    }

    #overlay {
      position: fixed; inset: 0;
      display: none; flex-direction: column;
      align-items: center; justify-content: flex-end;
      padding-bottom: 32px;
      pointer-events: none; z-index: 100;
    }
    #overlay.active { display: flex; }

    #status-box {
      font-family: 'DM Mono', monospace;
      font-size: 0.75rem; color: white;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.1);
      padding: 8px 18px; border-radius: 40px;
      text-align: center; max-width: 300px;
      margin-bottom: 12px;
    }

    #input-panel {
      pointer-events: all;
      display: none; gap: 8px; align-items: center;
      background: rgba(0,0,0,0.65);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 40px;
      padding: 8px 8px 8px 16px;
      width: 90%; max-width: 360px;
      margin-bottom: 12px;
    }
    #input-panel.visible { display: flex; }

    #msg-input {
      flex: 1; background: transparent;
      border: none; outline: none;
      color: white; font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
    }
    #msg-input::placeholder { color: rgba(255,255,255,0.3); }

    #send-btn {
      width: 36px; height: 36px; border-radius: 50%;
      background: var(--accent); border: none;
      cursor: pointer; font-size: 1rem; flex-shrink: 0;
    }

    #exit-btn {
      pointer-events: all;
      padding: 8px 24px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.8rem; font-weight: 500;
      background: rgba(255,255,255,0.08);
      color: white;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 40px; cursor: pointer;
    }
  </style>
</head>
<body>

<div id="landing">
  <div class="grid-bg"></div>
  <div class="square-preview"></div>
  <h1>hidden memories</h1>
  <p class="subtitle">leave a word on the floor</p>
  <button id="launch-btn">enter AR</button>
</div>

<div id="overlay">
  <div id="status-box">point camera at the floor</div>
  <div id="input-panel">
    <input id="msg-input" type="text" maxlength="30" placeholder="write something…">
    <button id="send-btn">↑</button>
  </div>
  <button id="exit-btn">exit</button>
</div>

<div id="canvas-container"></div>

<script type="importmap">
{ "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js" } }
</script>

<script type="module">
import * as THREE from 'three';
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, serverTimestamp }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

/* ── Firebase ── */
const app = initializeApp({
  apiKey: "AIzaSyB_b5em8duOmdyNF006-BR1rSCIGNriCtk",
  authDomain: "hidden-memories-27f1a.firebaseapp.com",
  projectId: "hidden-memories-27f1a",
  storageBucket: "hidden-memories-27f1a.firebasestorage.app",
  messagingSenderId: "61920134607",
  appId: "1:61920134607:web:e62e0b4b3f947985b6beba"
});
const db  = getFirestore(app);
const col = collection(db, "messages");

/* ── DOM ── */
const landing    = document.getElementById('landing');
const overlay    = document.getElementById('overlay');
const statusBox  = document.getElementById('status-box');
const inputPanel = document.getElementById('input-panel');
const msgInput   = document.getElementById('msg-input');
const sendBtn    = document.getElementById('send-btn');
const exitBtn    = document.getElementById('exit-btn');

/* ── Three.js state ── */
let camera, scene, renderer;
let hitTestSource = null;
let localSpace    = null;
let anchor        = null;
let reticle       = null;
let squareGroup   = null;
let xrSession     = null;
let placed        = false;
let messages      = [];
let textMeshes    = [];

/* ── Firestore live listener ── */
onSnapshot(col, snap => {
  messages = snap.docs.map(d => d.data());
  if (placed) rebuildTexts();
});

/* ── Submit message ── */
sendBtn.addEventListener('click', submit);
msgInput.addEventListener('keydown', e => { if (e.key === 'Enter') submit(); });

async function submit() {
  const text = msgInput.value.trim();
  if (!text || !placed) return;
  msgInput.value = '';
  const slot = findSlot();
  await addDoc(col, { text, x: slot.x, z: slot.z, createdAt: serverTimestamp() });
}

function findSlot() {
  const cols = 5, rows = 5;
  const cw = 1 / cols, ch = 1 / rows;
  const used = new Set(messages.map(m => `${r(m.x)},${r(m.z)}`));
  for (let row = 0; row < rows; row++) {
    for (let col = 0; col < cols; col++) {
      const x = r(-0.5 + cw * col + cw / 2);
      const z = r(-0.5 + ch * row + ch / 2);
      if (!used.has(`${x},${z}`)) return { x, z };
    }
  }
  return { x: r((Math.random() - 0.5) * 0.8), z: r((Math.random() - 0.5) * 0.8) };
}
const r = v => Math.round(v * 1000) / 1000;

/* ── Three.js init ── */
function initThree() {
  scene    = new THREE.Scene();
  camera   = new THREE.PerspectiveCamera(70, innerWidth / innerHeight, 0.01, 30);
  renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
  renderer.setPixelRatio(devicePixelRatio);
  renderer.setSize(innerWidth, innerHeight);
  renderer.xr.enabled = true;
  renderer.setClearColor(0x000000, 0);
  document.getElementById('canvas-container').appendChild(renderer.domElement);
  scene.add(new THREE.AmbientLight(0xffffff, 1.5));

  /* Reticle */
  reticle = new THREE.Group();
  reticle.add(new THREE.Mesh(
    new THREE.RingGeometry(0.07, 0.09, 32),
    new THREE.MeshBasicMaterial({ color: 0x00d4ff, side: THREE.DoubleSide })
  ));
  reticle.add(new THREE.Mesh(
    new THREE.CircleGeometry(0.018, 16),
    new THREE.MeshBasicMaterial({ color: 0xffffff })
  ));
  reticle.rotation.x = -Math.PI / 2;
  reticle.visible = false;
  scene.add(reticle);

  /* Square boundary */
  squareGroup = new THREE.Group();
  const edges = new THREE.LineSegments(
    new THREE.EdgesGeometry(new THREE.PlaneGeometry(1, 1)),
    new THREE.LineBasicMaterial({ color: 0x00d4ff, linewidth: 2 })
  );
  edges.rotation.x = -Math.PI / 2;
  squareGroup.add(edges);

  /* Corner marks */
  const cMat = new THREE.LineBasicMaterial({ color: 0xffffff, linewidth: 3 });
  const L = 0.1, H = 0.5;
  [[-H,-H],[H,-H],[-H,H],[H,H]].forEach(([x,z]) => {
    [[x,z,x+(x>0?-L:L),z],[x,z,x,z+(z>0?-L:L)]].forEach(([x1,z1,x2,z2]) => {
      const ln = new THREE.Line(
        new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(x1,0,z1), new THREE.Vector3(x2,0,z2)]),
        cMat
      );
      ln.rotation.x = -Math.PI / 2;
      squareGroup.add(ln);
    });
  });

  squareGroup.position.y = 0.002;
  squareGroup.visible = false;
  scene.add(squareGroup);

  window.addEventListener('resize', () => {
    camera.aspect = innerWidth / innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
  });
}

/* ── Text mesh from canvas ── */
function makeText(text) {
  const canvas = document.createElement('canvas');
  canvas.width = 512; canvas.height = 80;
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, 512, 80);
  ctx.fillStyle = '#ffffff';
  ctx.font = '500 28px DM Sans, sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(text, 256, 40);
  const tex = new THREE.CanvasTexture(canvas);
  const mesh = new THREE.Mesh(
    new THREE.PlaneGeometry(0.19, 0.03),
    new THREE.MeshBasicMaterial({ map: tex, transparent: true, side: THREE.DoubleSide, depthWrite: false })
  );
  mesh.rotation.x = -Math.PI / 2;
  return mesh;
}

function rebuildTexts() {
  textMeshes.forEach(m => squareGroup.remove(m));
  textMeshes = [];
  messages.forEach(msg => {
    const m = makeText(msg.text);
    m.position.set(msg.x, 0.003, msg.z);
    squareGroup.add(m);
    textMeshes.push(m);
  });
}

/* ── Start AR ── */
document.getElementById('launch-btn').addEventListener('click', startAR);

async function startAR() {
  if (!navigator.xr) return alert('WebXR not supported. Open in XR Viewer or Chrome on Android.');
  const supported = await navigator.xr.isSessionSupported('immersive-ar').catch(() => false);
  if (!supported) return alert('AR not supported on this device or browser.');

  landing.style.display = 'none';
  overlay.classList.add('active');
  initThree();

  try {
    xrSession = await navigator.xr.requestSession('immersive-ar', {
      requiredFeatures: ['hit-test'],
      optionalFeatures: ['local-floor', 'anchors', 'dom-overlay'],
      domOverlay: document.body.contains(overlay) ? { root: overlay } : undefined
    });
    renderer.xr.setReferenceSpaceType('local-floor');
    await renderer.xr.setSession(xrSession);
    xrSession.addEventListener('end', onEnd);
    try {
      localSpace = await xrSession.requestReferenceSpace('local-floor');
    } catch(e) {
      localSpace = await xrSession.requestReferenceSpace('local');
    }
    hitTestSource = await xrSession.requestHitTestSource({
      space: await xrSession.requestReferenceSpace('viewer')
    });
    document.addEventListener('click', onTap);
    renderer.setAnimationLoop(onFrame);
  } catch(e) {
    alert('Error: ' + e.message);
    onEnd();
  }
}

/* ── Tap to place ── */
function onTap(e) {
  if (e.target.closest('#input-panel') || e.target.closest('#exit-btn')) return;
  if (!reticle.visible) return;

  const pos = new THREE.Vector3();
  reticle.getWorldPosition(pos);
  squareGroup.position.set(pos.x, 0, pos.z);
  squareGroup.visible = true;
  reticle.visible = false;

  if (!placed) {
    placed = true;
    rebuildTexts();
    inputPanel.classList.add('visible');
    statusBox.textContent = 'tap to move · type to leave a memory';

    if (xrSession?.createAnchor) {
      const frame = renderer.xr.getFrame();
      if (frame) {
        frame.createAnchor(
          new XRRigidTransform({ x: pos.x, y: 0, z: pos.z, w: 1 }, { x:0,y:0,z:0,w:1 }),
          localSpace
        ).then(a => { anchor = a; }).catch(() => {});
      }
    }
  }
}

/* ── Render loop ── */
const _m4 = new THREE.Matrix4();

function onFrame(ts, frame) {
  if (!frame) return;
  if (hitTestSource) {
    const hits = frame.getHitTestResults(hitTestSource);
    if (hits.length) {
      const pose = hits[0].getPose(localSpace);
      if (pose) {
        reticle.visible = true;
        _m4.fromArray(pose.transform.matrix);
        reticle.position.setFromMatrixPosition(_m4);
      }
    } else reticle.visible = false;
  }
  if (anchor && frame.trackedAnchors?.has(anchor)) {
    const ap = frame.getPose(anchor.anchorSpace, localSpace);
    if (ap) {
      _m4.fromArray(ap.transform.matrix);
      const p = new THREE.Vector3().setFromMatrixPosition(_m4);
      squareGroup.position.set(p.x, 0, p.z);
    }
  }
  renderer.render(scene, camera);
}

/* ── End ── */
exitBtn.addEventListener('click', () => xrSession?.end());

function onEnd() {
  xrSession = null; anchor = null; placed = false;
  hitTestSource = null;
  renderer.setAnimationLoop(null);
  overlay.classList.remove('active');
  inputPanel.classList.remove('visible');
  landing.style.display = 'flex';
  document.removeEventListener('click', onTap);
  renderer.domElement.parentNode?.removeChild(renderer.domElement);
}
</script>
</body>
</html>
